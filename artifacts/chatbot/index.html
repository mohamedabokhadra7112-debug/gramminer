<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>GramMiner</title>
    <meta name="description" content="GramMiner — Tap to mine GMR on Telegram" />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="GramMiner" />
    <meta property="og:description" content="GramMiner — Tap to mine GMR on Telegram" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GramMiner" />
    <meta name="twitter:description" content="GramMiner — Tap to mine GMR on Telegram" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Prevent black flash before React mounts -->
    <style>
      html, body, #root {
        background-color: #0a0b14;
        margin: 0;
        padding: 0;
      }
    </style>
    <!-- Telegram Mini App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Call ready() + expand() as early as possible — before any React bundle -->
    <script>
      (function () {
        try {
          var tg = window.Telegram && window.Telegram.WebApp;
          if (tg) {
            tg.ready();
            tg.expand();
          }
        } catch (e) {
          // Ignore — SDK not yet available in browser preview
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
